  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">

  <!-- Tailwind CSS 폰트 강제 설정 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'Roboto', 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'sans-serif'],

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  <style>
    body, html {
      background-color: #FFFFFF; 
      -ms-overflow-style: none; 
      scrollbar-width: none; 
    }
    body::-webkit-scrollbar, .hide-scroll::-webkit-scrollbar {
      display: none;
    }

    @keyframes heartPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .animate-heart { animation: heartPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .smooth-transition { transition: all 0.2s ease; }

    /* 스크롤 떠오르는 모션 (Scroll Reveal) CSS */
    .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
    .reveal.active { opacity: 1; transform: translateY(0); }

    .menu-enter { opacity: 0; transform: translateY(-10px); }
    .menu-enter-active { opacity: 1; transform: translateY(0); transition: opacity 300ms, transform 300ms; }
    .menu-exit { opacity: 1; transform: translateY(0); }
    .menu-exit-active { opacity: 0; transform: translateY(-10px); transition: opacity 300ms, transform 300ms; }
    
    /* 3D 책 돌려보기 스타일 */
    .book-container {
      perspective: 1000px;
      width: 160px;
      height: 236px;
      margin: 0 auto;
      position: relative;
    }
    .book {
      width: 100%;
      height: 100%;
      position: absolute;
      transform-style: preserve-3d;
    }
    .book-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      background-size: cover;
      background-position: center;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
    }
    .book-front {
      background-image: url('book_01.jpg');
      transform: rotateY(0deg) translateZ(15px);
    }
    .book-back {
      background-image: url('book_03.jpg');
      transform: rotateY(180deg) translateZ(15px);
    }
    .book-spine {
      width: 30px; /* 책 두께 */
      height: 100%;
      background-image: url('book_02.jpg');
      transform: rotateY(-90deg); 
      left: -15px; 
    }
  </style>
</head>
<body class="font-sans">

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, signInWithEmailAndPassword, setPersistence, inMemoryPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    import autoAnimate from "https://cdn.jsdelivr.net/npm/@formkit/auto-animate@0.8.2/+esm";

    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ==========================================
    // 파이어베이스 서버 설정
    // ==========================================
    let userFirebaseConfig = {
        apiKey: "AIzaSyDzJRBlj8u-96l6kQdLv2O5x-3Hq4MEn7w",
        authDomain: "clearspiral-fcf4a.firebaseapp.com",
        projectId: "clearspiral-fcf4a",
        storageBucket: "clearspiral-fcf4a.firebasestorage.app",
        messagingSenderId: "495711119173",
        appId: "1:495711119173:web:eaf4c46f710d091acd402c"
    };

    if (typeof __firebase_config !== 'undefined' && Object.keys(__firebase_config).length > 0) {
      userFirebaseConfig = JSON.parse(__firebase_config);

    const app = initializeApp(userFirebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'event-helix-official';
    
    const RAW_BAD_WORDS = ['일베', '개새끼', '개새기', '시발럼', '씨발', '좆', '조까', '좆까', '시팔', '씨팔', '썅놈', 'nigger', '오줌', 'ㅅㅂㄹ', 'ㅅㅂㄴ', 'ㅅㅂ', 'ㅅㅍ', '씹새끼', '씹놈', '병신', '등신', '븅신', '미췬넘', '호로새끼', ' 시발새끼', '181819', '븅딱', '애미', '애미나이', '자지', '보지', '꼬추', '똥꼬', '섹스', 'sex', '성행위', '족까', '좃', '시1발', '씨1발', '씨1팔', '좆1까', '미1친', '노무노무', '노무', '젖', '유방', '이기야', '창녀', '창년', '아가리', '떡치', 'x끼', 'x발', 'x팔', '뒤져라', '응디', '쓰벌', '좌빨', '극우', '베충', '종북', '내란', '국힘', '민주당', '이재명', '재매이햄', '문재앙', '문재인', '이명박', '박근혜', ' 박정희', '전두환', '전땅크', 'ㅈ같이', '음란', '대깨문', '조센징', '쪽빠리', '쪽빨이', '조센진', '왜놈', '양키', '흑형', '니거', '성폭행', '성추행', '강간', '윤간', '공산당', '존나', 'ㅈㄴ', '틀딱', '돼지년', '짭새', '쥐박이', '지랄', '쥐랄', '짱깨', '성괴', '젼나', '쑤레기', '18년'];
    const BAD_WORDS = RAW_BAD_WORDS.map(word => word.trim());

    // --- 아이콘 컴포넌트 ---
    const Icon = ({ name, size = 24, fill = "none", className = "" }) => {
      const paths = {
        play: <path d="M8 5v14l11-7z" fill="currentColor" stroke="none" />,

        heart: <><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></>,

        trash2: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>,
        ban: <><circle cx="12" cy="12" r="10"/><path d="m4.9 4.9 14.2 14.2"/></>,
        download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></>,
        chevronLeft: <path d="m15 18-6-6 6-6"/>,
        chevronRight: <path d="m9 18 6-6-6-6"/>,
        chevronsLeft: <><path d="m11 17-5-5 5-5"/><path d="m18 17-5-5 5-5"/></>,
        chevronsRight: <><path d="m6 17 5-5-5-5"/><path d="m13 17 5-5-5-5"/></>,
        alertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
        eye: <><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></>,
        eyeOff: <><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></>
      };

      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {paths[name]}
        </svg>
      );
    };

    // --- 스크롤 모션 훅 ---
    function useReveal() {
      useEffect(() => {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('active');
            }
          });
        }, { threshold: 0.1 });
        const elements = document.querySelectorAll('.reveal');
        elements.forEach(el => observer.observe(el));
        return () => observer.disconnect();
      });
    }

    // --- 📚 도서 표지 띠지 렌더링 전용 컴포넌트 ---
    function BookCoverPreviewUI({ content }) {
      return (
        <div className="relative w-full max-w-[240px] mx-auto shadow-lg border border-gray-200 bg-white">
          <img src="book_copy.png" alt="도서 표지 띠지 미리보기" className="w-full h-auto block" 
               onError={(e) => { 
                 e.target.style.display='none'; 
                 e.target.insertAdjacentHTML('afterend', '<div class="w-full aspect-[2/3] bg-gray-200 flex items-center justify-center text-xs text-gray-500">book_copy.png 오류</div>'); 
               }} />
          
          <div 
            className="absolute flex items-center justify-center px-1"
            style={{ top: '75%', left: '4.5%', width: '90.6%', height: '12.2%' }}
          >
            <p 
              className="font-black text-center leading-[1.4] tracking-tight whitespace-pre-wrap w-full"
              style={{
                fontFamily: "'Noto Serif KR', serif", color: '#0A1931', wordBreak: 'keep-all', 
                fontSize: content?.length > 16 || content?.includes('\n') ? '12px' : '14px',
                fontWeight: 900 
              }}
            >
              {content || "이곳에 띠지 카피가 노출됩니다."}
            </p>
          </div>
        </div>
      );
    }

    // ==========================================
    // 메인 앱 구조 시작
    // ==========================================
    function App() {
      const [user, setUser] = useState(null);
      const [entries, setEntries] = useState([]);
      const [bannedList, setBannedList] = useState([]); 
      
      const [currentView, setCurrentView] = useState('home');
      const [isAdminAuth, setIsAdminAuth] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);

      useEffect(() => {
        const initAuth = async () => {
          try {
            // ★ 브라우저 저장소 대신 메모리(RAM)에 임시 로그인 정보를 보관하도록 설정
            await setPersistence(auth, inMemoryPersistence);
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
            else await signInAnonymously(auth);
          } catch (error) { console.error("Auth error:", error); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (u) => setUser(u));
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        // ★ if (!user) return; 조건을 제거하여 접속 즉시 데이터를 불러오도록 수정
        const entriesRef = collection(db, 'artifacts', appId, 'public', 'data', 'helix_entries');
        const q = query(entriesRef, orderBy("createdAt", "desc"), limit(500));
        
        const unsubEntries = onSnapshot(q, (snapshot) => {
          setEntries(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        }, (error) => console.error(error));

        const bannedRef = collection(db, 'artifacts', appId, 'public', 'data', 'helix_banned');
        const unsubBanned = onSnapshot(bannedRef, (snapshot) => {
          setBannedList(snapshot.docs.map(doc => ({ id: doc.id, email: doc.data().email })));
        }, (error) => console.error(error));

        return () => { unsubEntries(); unsubBanned(); };
      }, []); // ★ 의존성 배열에서 [user] 제거

      useEffect(() => {
        const checkHash = () => { if (window.location.hash === '#admin') setCurrentView('admin'); };
        window.addEventListener('hashchange', checkHash);
        checkHash();
        return () => window.removeEventListener('hashchange', checkHash);
      }, []);

      const toggleLike = async (id, isCurrentlyLiked) => {
        if (!user) return;
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'helix_entries', id);
        try {
          if (isCurrentlyLiked) {
            await updateDoc(docRef, { likes: increment(-1) });
          } else {
            await updateDoc(docRef, { likes: increment(1) });
          }
        } catch (err) { console.error("Like toggle failed:", err); }
      };

      const trackStoreClick = async (storeName) => {
        if (!user) return;
        const metricsRef = doc(db, 'artifacts', appId, 'public', 'data', 'helix_metrics', 'store_clicks');
        try {
          await setDoc(metricsRef, { [storeName]: increment(1) }, { merge: true });
        } catch (err) { console.error("Click tracking failed:", err); }
      };

      const handleNavClick = (view) => {
        setCurrentView(view);
        setIsMenuOpen(false);
        window.scrollTo(0,0);
      };

      return (
        <div className="min-h-screen flex justify-center bg-gray-100 hide-scroll">
          <div className="w-full max-w-md bg-white min-h-screen relative shadow-2xl flex flex-col overflow-x-hidden">
            
            <header className="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 h-16 flex items-center justify-between px-4">
              <button onClick={() => setIsMenuOpen(true)} className="w-10 h-10 flex items-center justify-center text-gray-800 hover:text-[#0A1931] smooth-transition">
                <Icon name="menu" size={26} />
              </button>
              <button onClick={() => handleNavClick('home')} className="absolute left-1/2 -translate-x-1/2 flex items-center justify-center cursor-pointer">
                <img src="booklogo.png" alt="투명한 나선" className="h-7 object-contain" onError={(e) => { e.target.style.display='none'; e.target.insertAdjacentHTML('afterend', '<span class="font-bold text-lg tracking-tighter text-[#0A1931]">투명한 나선</span>'); }} />
              </button>
              <div className="w-10"></div> 
            </header>

            {isMenuOpen && (
              <>
                <div className="fixed inset-0 z-[100] bg-black/40 backdrop-blur-sm animate-in fade-in duration-300" onClick={() => setIsMenuOpen(false)}></div>
                <div className="fixed top-0 left-0 bottom-0 w-[260px] bg-white z-[101] shadow-[10px_0_30px_rgba(0,0,0,0.1)] flex flex-col animate-in slide-in-from-left duration-300">
                  <div className="h-16 flex items-center justify-between px-4 border-b border-gray-100">
                    <img src="booklogo.png" alt="로고" className="h-6 object-contain ml-2" onError={(e) => e.target.style.display='none'} />
                    <button onClick={() => setIsMenuOpen(false)} className="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-800"><Icon name="x" size={24} /></button>
                  </div>
                  <div className="flex flex-col p-6 space-y-6 mt-4">
                    <SidebarLink label="홈" view="home" current={currentView} onClick={handleNavClick} />
                    <SidebarLink label="이벤트 안내" view="info" current={currentView} onClick={handleNavClick} />
                    <SidebarLink label="응모하기" view="participate" current={currentView} onClick={handleNavClick} />
                    <SidebarLink label="응모작 보기" view="list" current={currentView} onClick={handleNavClick} />
                    <SidebarLink label="도서 안내" view="book" current={currentView} onClick={handleNavClick} />
                  </div>
                </div>
              </>
            )}

            <main className="flex-grow flex flex-col relative z-10">
              {currentView === 'home' && <HomeView setView={setCurrentView} entries={entries} toggleLike={toggleLike} trackStoreClick={trackStoreClick} />}
              {currentView === 'info' && <InfoView />}
              {currentView === 'participate' && <ParticipateView user={user} entries={entries} bannedEmails={bannedList.map(b=>b.email)} setView={setCurrentView} />}
              {currentView === 'list' && <ListView entries={entries} user={user} toggleLike={toggleLike} />}
              {currentView === 'book' && <BookView trackStoreClick={trackStoreClick} />}
              {currentView === 'admin' && <AdminView entries={entries} bannedList={bannedList} isAdminAuth={isAdminAuth} setIsAdminAuth={setIsAdminAuth} appId={appId} db={db} user={user} />}
            </main>

            <footer className="mt-8 bg-white py-6 flex flex-col items-center border-t border-gray-100">
              <AdminHiddenTrigger setView={setCurrentView}>
                <img src="bi_vookda.png" alt="출판사 로고" className="h-4 object-contain opacity-30 pointer-events-none" onError={(e) => { e.target.style.display='none'; }} />
              </AdminHiddenTrigger>
              <p className="mt-2 text-[10px] text-gray-300 font-medium">© 2026 VOOKDA. All rights reserved.</p>
            </footer>

          </div>
        </div>
      );
    }

    function SidebarLink({ label, view, current, onClick }) {
      const active = current === view;
      return (
        <button onClick={() => onClick(view)} className={`text-left text-[17px] font-bold tracking-tight smooth-transition ${active ? 'text-[#0A1931]' : 'text-gray-400 hover:text-gray-800'}`}>
          {label}
        </button>
      );
    }

    function AdminHiddenTrigger({ children, setView }) {
      const [clicks, setClicks] = useState(0);
      const handleClick = () => {
        setClicks(c => c + 1);
        if (clicks + 1 >= 5) { setView('admin'); setClicks(0); }
      };
      return <div onClick={handleClick} className="cursor-default select-none pt-2 px-6">{children}</div>;
    }

    // ==========================================
    // 1. Home View (메인)
    // ==========================================
    function HomeView({ setView, entries, toggleLike, trackStoreClick }) {
      useReveal(); 
      const images = [{ id: 1, src: "001.png" }, { id: 2, src: "002.png" }, { id: 3, src: "003.png" }, { id: 4, src: "004.png" }];
      const [currentSlide, setCurrentSlide] = useState(0);
      const [isPaused, setIsPaused] = useState(false); 
      const [isDragging, setIsDragging] = useState(false);
      const [dragOffset, setDragOffset] = useState(0);
      const [sortType, setSortType] = useState('recent'); 
      const [previewModalContent, setPreviewModalContent] = useState(null); 

      const startX = useRef(0);
      const autoPlayRef = useRef(null);
      const listRef = useRef(null);

      useEffect(() => {
        if (listRef.current) autoAnimate(listRef.current, { duration: 300, easing: 'ease-in-out' });
      }, []);

      const startAutoPlay = useCallback(() => {
        if (autoPlayRef.current) clearInterval(autoPlayRef.current);
        if (!isPaused) {
          autoPlayRef.current = setInterval(() => setCurrentSlide(prev => (prev + 1) % images.length), 5000);
        }
      }, [images.length, isPaused]);

      useEffect(() => {
        startAutoPlay();
        return () => clearInterval(autoPlayRef.current);
      }, [startAutoPlay]);

      const onDragStart = (e) => {
        setIsDragging(true);
        startX.current = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
        clearInterval(autoPlayRef.current);
      };
      const onDragMove = (e) => {
        if (!isDragging) return;
        const currentX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
        setDragOffset(currentX - startX.current);
      };
      const onDragEnd = () => {
        if (!isDragging) return;
        setIsDragging(false);
        if (dragOffset < -50 && currentSlide < images.length - 1) setCurrentSlide(c => c + 1);
        else if (dragOffset < -50 && currentSlide === images.length - 1) setCurrentSlide(0);
        else if (dragOffset > 50 && currentSlide > 0) setCurrentSlide(c => c - 1);
        else if (dragOffset > 50 && currentSlide === 0) setCurrentSlide(images.length - 1);
        setDragOffset(0);
        startAutoPlay();
      };

      const [frozenIds, setFrozenIds] = useState(null);

      useEffect(() => {
        if (sortType === 'likes') {
          if (frozenIds === null && entries.length > 0) {
            // ★ 수정: isBlinded 처리된 항목 필터링 추가
            const sorted = [...entries]
              .filter(e => (e.reports || 0) < 10 && !e.isBlinded)
              .sort((a, b) => b.likes - a.likes || b.createdAt - a.createdAt)
              .slice(0, 5);
            setFrozenIds(sorted.map(e => e.id));
          }
        } else {
          setFrozenIds(null);
        }
      }, [sortType, entries, frozenIds]); 

      const topEntries = useMemo(() => {
        // ★ 수정: isBlinded 처리된 항목 필터링 추가
        const validEntries = [...entries].filter(e => (e.reports || 0) < 10 && !e.isBlinded);
        
        if (sortType === 'likes' && frozenIds !== null) {
          const entryMap = new Map(validEntries.map(e => [e.id, e]));
          return frozenIds.map(id => entryMap.get(id)).filter(Boolean);
        }
        
        return validEntries.sort((a, b) => b.createdAt - a.createdAt).slice(0, 5);
      }, [entries, sortType, frozenIds]);

      return (
        <div className="animate-in fade-in duration-500">
          <div className="relative w-full aspect-square overflow-hidden bg-gray-100 border-b border-gray-100"
               onMouseDown={onDragStart} onMouseMove={onDragMove} onMouseUp={onDragEnd} onMouseLeave={onDragEnd}
               onTouchStart={onDragStart} onTouchMove={onDragMove} onTouchEnd={onDragEnd} style={{ touchAction: 'pan-y' }}>
            <div className="flex h-full w-full will-change-transform" style={{ transform: `translateX(calc(-${currentSlide * 100}% + ${dragOffset}px))`, transition: isDragging ? 'none' : 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)' }}>
              {images.map((img, idx) => (
                <div key={img.id} className="w-full h-full flex-shrink-0 relative select-none bg-[#0A1931]">
                  <img src={img.src} alt={`배너 ${idx + 1}`} className="w-full h-full object-cover pointer-events-none" onError={(e) => { e.target.style.display='none'; }} style={{ transform: 'translateZ(0)', backfaceVisibility: 'hidden', WebkitFontSmoothing: 'antialiased' }} />
                </div>
              ))}
            </div>
            
            <div className="absolute bottom-4 left-0 right-0 flex justify-center items-center gap-3 z-20">
              <button onClick={() => setIsPaused(!isPaused)} className="w-6 h-6 flex justify-center items-center text-white/70 hover:text-white transition-colors"><Icon name={isPaused ? "play" : "pause"} size={16} /></button>
              <div className="flex gap-2 items-center">
                {images.map((_, idx) => (
                  <button key={idx} onClick={() => { setCurrentSlide(idx); setIsPaused(true); }} className={`transition-all duration-300 rounded-full ${idx === currentSlide ? 'w-2 h-2 bg-white' : 'w-2 h-2 bg-white/50'}`} />
                ))}
              </div>
            </div>
          </div>
          
          <div className="px-6 py-6 border-b border-gray-100 bg-white">
            <button onClick={() => setView('participate')} className="w-full bg-[#0A1931] text-white py-4 rounded-full font-bold text-[15px] shadow-md hover:bg-[#1a2c4e] hover:shadow-lg smooth-transition tracking-wide">이벤트 응모하기</button>

          <div className="px-6 py-10 border-b border-gray-100 bg-white reveal">
            <div className="flex items-end justify-between mb-4">

        const { name, value } = e.target;
        if (name === 'content') {
           if (value.length > 30) return;
           const lines = value.split('\n');
           if (lines.length > 2) return; 
        }
        if (name === 'password' && value.length > 4) return;
        if (name === 'nickname' && value.length > 8) return;
        setForm(p => ({ ...p, [name]: value }));
      };

      const handleEmailBlur = () => {
        if (!form.email) return;
        const existingEntry = entries.find(ent => ent.email === form.email);
        if (existingEntry) {
          setForm(p => ({ ...p, nickname: existingEntry.nickname }));
        }
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!user) return alert("서버 연결 대기 중입니다.");
        if (!form.nickname || !form.email || !form.password || !form.content) return alert("모든 항목을 입력해주세요.");
        if (form.password.length !== 4 || isNaN(form.password)) return alert("비밀번호는 숫자 4자리로 입력해주세요.");
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) return alert("올바른 이메일 형식을 입력해주세요.");
        if (bannedEmails.includes(form.email)) return alert("참여가 제한된 계정입니다.");
        
        if (entries.filter(ent => ent.email === form.email).length >= 1) return alert("한 개의 이메일 계정당 1회만 응모 가능합니다.");
        
        if (BAD_WORDS.some(w => form.nickname.includes(w))) return alert("닉네임에 부적절한 단어가 포함되어 있습니다.");
        if (BAD_WORDS.some(w => form.content.includes(w))) return alert("응모 내용에 부적절한 단어가 포함되어 있습니다.");

        const existingNicknameEntry = entries.find(ent => ent.nickname === form.nickname);
        if (existingNicknameEntry && existingNicknameEntry.email !== form.email) {
          return alert("이미 다른 분이 사용 중인 닉네임입니다. 다른 닉네임을 설정해주세요.");
        }

        setLoading(true);
        try {
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'helix_entries'), {
            uid: user.uid,
            nickname: form.nickname.trim(), email: form.email.trim(), password: form.password, content: form.content.trim(), likes: 0, reports: 0, createdAt: Date.now(),
            isBlinded: false // ★ 필드 초기화(옵션)
          });
          setForm({ nickname: '', email: '', password: '', content: '' });
          alert("응모가 완료되었습니다!");
          setView('list');
        } catch (err) {
          console.error(err); alert("등록 오류 발생");
        }
        setLoading(false);
      };

      return (
        <div className="px-6 py-10 animate-in fade-in duration-500">
          <div className="mb-10 pb-4 border-b border-gray-100 reveal">
            <div className="flex justify-between items-end mb-2">
              <h2 className="text-[20px] font-bold text-[#0A1931] tracking-tight">카피 공모전 응모하기</h2>
              <button type="button" onClick={() => setIsModalOpen(true)} className="flex items-center gap-1.5 text-[12px] font-bold text-gray-500 hover:text-[#0A1931] smooth-transition pb-0.5">
                <Icon name="search" size={14} /> 내 글 찾기
              </button>
            </div>
            <p className="text-[13px] text-gray-500 font-medium leading-relaxed break-keep">
              '나만의 한 수'가 담긴 카피를 응모해주세요. (공백 포함 30자 이하 / 최대 2행)
            </p>
          </div>

          <form onSubmit={handleSubmit} className="space-y-6 reveal">
            
            <div className="flex gap-4">
              <div className="flex-1">
                <label className="block text-[12px] font-bold text-gray-800 mb-2">닉네임 <span className="text-gray-400 font-normal ml-1">(최대 8자)</span></label>
                <input type="text" name="nickname" value={form.nickname} onChange={handleChange} placeholder="예: 유카와" className="w-full p-4 bg-white border border-gray-200 rounded-none text-[14px] outline-none focus:border-[#0A1931] smooth-transition" />
              </div>
              <div className="w-[110px]">
                <label className="block text-[12px] font-bold text-gray-800 mb-2">비밀번호</label>
                <input type="password" name="password" value={form.password} onChange={handleChange} placeholder="숫자 4자리" maxLength="4" className="w-full p-4 bg-white border border-gray-200 rounded-none text-[14px] outline-none tracking-widest text-center focus:border-[#0A1931] smooth-transition" />
              </div>
            </div>

            <div>
              <label className="block text-[12px] font-bold text-gray-800 mb-2">연락받을 이메일 주소</label>
              <input type="email" name="email" value={form.email} onChange={handleChange} onBlur={handleEmailBlur} placeholder="이메일 주소 입력" className="w-full p-4 bg-white border border-gray-200 rounded-none text-[14px] outline-none focus:border-[#0A1931] smooth-transition" />
            </div>

            <div>
              <div className="flex justify-between items-end mb-2">
                <label className="block text-[12px] font-bold text-gray-800">응모 카피 내용 <span className="text-gray-400 font-normal ml-1">(엔터 줄바꿈 2행까지 가능)</span></label>
                <span className={`text-[11px] font-bold ${form.content.length >= 30 ? 'text-red-500' : 'text-gray-400'}`}>{form.content.length} / 30자</span>
              </div>
              <textarea name="content" value={form.content} onChange={handleChange} placeholder="소설의 매력을 담은 한 줄을 적어주세요." rows="3" className="w-full p-4 bg-white border border-gray-200 rounded-none text-[15px] leading-relaxed outline-none focus:border-[#0A1931] smooth-transition resize-none" />
            </div>

            <div className="bg-gray-50 p-6 rounded-2xl border border-gray-200 mt-2 mb-8">
               <h4 className="text-[12px] font-bold text-gray-500 mb-4 text-center tracking-wide">내 카피 가상 적용 미리보기</h4>
               <BookCoverPreviewUI content={form.content} />
            </div>

            <div className="pt-4">
              <ul className="text-[11px] text-gray-500 space-y-2 font-medium tracking-tight leading-relaxed">
                <li>• 이메일 주소는 반드시 당첨 연락 수신이 가능한 주소로 입력해주세요.</li>
                <li>• 당첨시 이메일 주소로 당첨 안내 메일이 발송됩니다.</li>
                <li>• 한 개의 이메일 계정당 1회만 응모 가능합니다.</li>
                <li>• 입력한 이메일 주소는 관리자에게만 공개 됩니다.</li>
                <li><strong className="text-red-500">• 부적절한 언어 및 타인을 비방하는 문구 사용 시, 관리자에 의해 삭제될 수 있습니다.</strong></li>
              </ul>
            </div>

            <button type="submit" disabled={loading} className="w-full bg-[#0A1931] text-white py-4 rounded-full font-bold text-[15px] mt-6 disabled:opacity-50 hover:bg-[#1a2c4e] shadow-md hover:shadow-lg smooth-transition tracking-wide">
              {loading ? '등록 중...' : '응모하기'}
            </button>
          </form>
          
          {isModalOpen && <MyPostModal entries={entries} onClose={() => setIsModalOpen(false)} />}
          
        </div>
      );
    }

    // ==========================================
    // 4. List View (전체보기)
    // ==========================================
    function ListView({ entries, user, toggleLike }) {
      useReveal();
      const [sortType, setSortType] = useState('recent'); 
      const [currentPage, setCurrentPage] = useState(1);
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [previewModalContent, setPreviewModalContent] = useState(null);
      
      const listRef = useRef(null);

      useEffect(() => {
        if (listRef.current) autoAnimate(listRef.current, { duration: 300, easing: 'ease-in-out' });
      }, []);
      
      const itemsPerPage = 10;
      const pagesPerBlock = 5; 
      
      const [frozenIds, setFrozenIds] = useState(null);

      useEffect(() => {
        if (sortType === 'likes') {
          if (frozenIds === null && entries.length > 0) {
            // ★ 수정: isBlinded 항목 필터링 적용
            const sorted = [...entries]
              .filter(e => (e.reports || 0) < 10 && !e.isBlinded)
              .sort((a, b) => b.likes - a.likes || b.createdAt - a.createdAt);
            setFrozenIds(sorted.map(e => e.id));
          }
        } else {
          setFrozenIds(null);
        }
      }, [sortType, entries, frozenIds]);

      const sortedEntries = useMemo(() => {
        // ★ 수정: isBlinded 항목 필터링 적용
        const validEntries = [...entries].filter(e => (e.reports || 0) < 10 && !e.isBlinded);
        
        if (sortType === 'likes' && frozenIds !== null) {
          const entryMap = new Map(validEntries.map(e => [e.id, e]));
          return frozenIds.map(id => entryMap.get(id)).filter(Boolean);
        } 
        
        return validEntries.sort((a, b) => b.createdAt - a.createdAt);
      }, [entries, sortType, frozenIds]);

      const totalPages = Math.ceil(sortedEntries.length / itemsPerPage) || 1;
      const currentItems = sortedEntries.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

      const currentBlock = Math.ceil(currentPage / pagesPerBlock);
      const startPage = (currentBlock - 1) * pagesPerBlock + 1;
      const endPage = Math.min(startPage + pagesPerBlock - 1, totalPages);

      const getPageNumbers = () => {
        let pages = [];
        for (let i = startPage; i <= endPage; i++) pages.push(i);
        return pages;
      };

      return (
        <div className="px-6 py-10 animate-in fade-in duration-500 min-h-screen">
          <div className="flex justify-between items-end mb-4 pb-4 border-b border-gray-100 reveal">
            <h2 className="text-[20px] font-bold text-[#0A1931] tracking-tight">응모작 전체 보기</h2>
            <button onClick={() => setIsModalOpen(true)} className="flex items-center gap-1.5 text-[12px] font-bold text-gray-500 hover:text-[#0A1931] smooth-transition">
              <Icon name="search" size={14} /> 내 글 찾기
            </button>
          </div>

          <div className="bg-gray-50 p-4 rounded-xl mb-6 flex items-start gap-2.5 reveal border border-gray-100">
             <Icon name="alertCircle" size={14} className="text-gray-400 shrink-0 mt-0.5" />
             <div className="text-[11px] text-gray-500 font-medium leading-relaxed space-y-1.5 tracking-tight break-keep flex-1">
               <div className="flex items-start"><span className="mr-1.5">•</span><span>부적절한 응모작은 사전 통보 없이 블라인드/삭제될 수 있습니다.</span></div>
               <div className="flex items-start"><span className="mr-1.5">•</span><span>응모작의 추천 수는 수상작 선정의 절대적 기준이 아니며, 심사 시 참고 자료로 활용됩니다.</span></div>
             </div>
          </div>

          <div className="flex gap-4 mb-6 border-b border-gray-100 reveal">
            <button onClick={() => { setSortType('recent'); setCurrentPage(1); }} className={`text-[13px] font-bold smooth-transition pb-3 border-b-2 -mb-[1px] ${sortType === 'recent' ? 'text-[#0A1931] border-[#0A1931]' : 'text-gray-400 border-transparent hover:text-gray-800'}`}>최신순</button>
            <button onClick={() => { setSortType('likes'); setCurrentPage(1); }} className={`text-[13px] font-bold smooth-transition pb-3 border-b-2 -mb-[1px] ${sortType === 'likes' ? 'text-[#0A1931] border-[#0A1931]' : 'text-gray-400 border-transparent hover:text-gray-800'}`}>추천순</button>
          </div>

          <div ref={listRef} className="flex flex-col mb-10 border-b border-gray-100 reveal">
            {currentItems.length === 0 ? <div className="text-center text-sm text-gray-400 py-16">작성된 글이 없습니다.</div>
              : currentItems.map((entry) => (
                  <EntryRow key={entry.id} entry={entry} toggleLike={toggleLike} rank={null} onPreview={(content) => setPreviewModalContent(content)} />
                ))
            }
          </div>

          {totalPages > 1 && (
            <div className="flex justify-center items-center gap-1 mt-8 reveal">
              <button onClick={() => setCurrentPage(Math.max(1, startPage - pagesPerBlock))} disabled={startPage === 1} className="p-2 text-gray-400 hover:text-gray-800 disabled:opacity-30 disabled:hover:text-gray-400 smooth-transition"><Icon name="chevronsLeft" size={18} /></button>
              <button onClick={() => setCurrentPage(p=>Math.max(1, p-1))} disabled={currentPage === 1} className="p-2 text-gray-400 hover:text-gray-800 disabled:opacity-30 disabled:hover:text-gray-400 smooth-transition"><Icon name="chevronLeft" size={18} /></button>
              
              <div className="flex gap-2 mx-3">
                {getPageNumbers().map(num => <button key={num} onClick={() => setCurrentPage(num)} className={`text-[13px] font-bold smooth-transition w-6 h-6 flex items-center justify-center ${currentPage === num ? 'text-[#0A1931] border-b border-[#0A1931]' : 'text-gray-400 hover:text-gray-800'}`}>{num}</button>)}
              </div>
              
              <button onClick={() => setCurrentPage(p=>Math.min(totalPages, p+1))} disabled={currentPage === totalPages} className="p-2 text-gray-400 hover:text-gray-800 disabled:opacity-30 disabled:hover:text-gray-400 smooth-transition"><Icon name="chevronRight" size={18} /></button>
              <button onClick={() => setCurrentPage(Math.min(totalPages, startPage + pagesPerBlock))} disabled={endPage === totalPages} className="p-2 text-gray-400 hover:text-gray-800 disabled:opacity-30 disabled:hover:text-gray-400 smooth-transition"><Icon name="chevronsRight" size={18} /></button>
            </div>
          )}

          {isModalOpen && <MyPostModal entries={entries} onClose={() => setIsModalOpen(false)} />}

          {previewModalContent && (
            <div className="fixed inset-0 z-[120] bg-black/60 backdrop-blur-sm flex items-center justify-center p-6 animate-in fade-in duration-200">
              <div className="bg-white p-6 rounded-2xl shadow-2xl relative w-full max-w-[320px] animate-in zoom-in-95">
                 <button onClick={() => setPreviewModalContent(null)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-800"><Icon name="x" size={24}/></button>
                 <h3 className="font-bold text-center text-[#0A1931] mb-6 text-[16px] tracking-tight">띠지 적용 가상 미리보기</h3>
                 <BookCoverPreviewUI content={previewModalContent} />
              </div>
            </div>
          )}
        </div>
      );
    }

    function EntryRow({ entry, toggleLike, rank, onPreview }) {
      const [isLiked, setIsLiked] = useState(!!localStorage.getItem(`liked_${entry.id}`));
      const [animate, setAnimate] = useState(false);

      const handleLikeClick = () => {
        const currentlyLiked = isLiked;
        setIsLiked(!currentlyLiked);
        if (!currentlyLiked) { 
          setAnimate(true); 
          setTimeout(() => setAnimate(false), 300); 
          localStorage.setItem(`liked_${entry.id}`, 'true');
        } else {
          localStorage.removeItem(`liked_${entry.id}`);
        }
        toggleLike(entry.id, currentlyLiked);
      };

      const handleReportClick = async () => {
        if (localStorage.getItem(`reported_${entry.id}`)) return alert("이미 신고한 응모작입니다.");
        if (window.confirm("이 응모작을 신고하시겠습니까? 누적 10회 이상 신고 시 자동으로 블라인드 처리됩니다.")) {
          localStorage.setItem(`reported_${entry.id}`, 'true');
          try {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'helix_entries', entry.id), { 
              reports: increment(1) 
            });
            alert("신고가 정상적으로 접수되었습니다.");
          } catch(e) { console.error("Report failed:", e); }
        }
      };

      return (
        <div className="py-5 border-t border-gray-100 flex justify-between items-start gap-4 group">
          <div className="flex-1">
            <div className="flex items-center gap-2 mb-2">
              {rank && <span className="text-[11px] font-bold text-[#0A1931] tracking-tight">{rank}.</span>}
              <span className="font-bold text-gray-800 text-[13px]">{entry.nickname}</span>
            </div>
            <p className="text-[#333] text-[15px] leading-[1.6] font-medium tracking-tight whitespace-pre-wrap break-all">{entry.content}</p>
            
            <div className="mt-3 flex items-center gap-3">
              {onPreview && (
                <button onClick={() => onPreview(entry.content)} className="text-[10px] font-bold text-[#0A1931] bg-blue-50 px-2 py-1 rounded-md hover:bg-blue-100 smooth-transition flex items-center gap-1">
                  <Icon name="eye" size={12} /> 표지 미리보기
                </button>
              )}
              <button onClick={handleReportClick} className="text-[10px] font-bold text-gray-400 hover:text-red-500 smooth-transition flex items-center gap-1">
                <Icon name="alertCircle" size={12} /> 신고
              </button>
            </div>
          </div>
          <button onClick={handleLikeClick} className="flex flex-col items-center justify-center min-w-[48px] pt-1">
            <Icon name="heart" size={20} fill={isLiked ? "currentColor" : "none"} className={`${isLiked ? 'text-[#0A1931]' : 'text-gray-300'} ${animate ? 'animate-heart' : ''} mb-1 smooth-transition`} />
            <span className={`text-[11px] font-bold ${isLiked ? 'text-[#0A1931]' : 'text-gray-400'}`}>{entry.likes || 0}</span>
          </button>
        </div>
      );
    }

    function BookStoreSquare({ storeId, img, url, name, trackStoreClick }) {
      return (
        <a href={url} target="_blank" rel="noreferrer" onClick={() => trackStoreClick(storeId)} className="flex items-center justify-center py-4 px-2 border border-gray-200 bg-white hover:bg-gray-50 smooth-transition rounded-xl">
          <img src={img} alt={name} className="h-5 object-contain smooth-transition" onError={(e) => { e.target.style.display='none'; }} />
        </a>
      );
    }

    // ==========================================
    // 5. Book View (도서 안내 - 3D 턴)
    // ==========================================
    function BookView({ trackStoreClick }) {
      useReveal();
      const [rotation, setRotation] = useState(0);
      const isDragging = useRef(false);
      const startX = useRef(0);
      const currentRotation = useRef(0);

      const handleStart = (clientX) => { isDragging.current = true; startX.current = clientX; currentRotation.current = rotation; };
      const handleMove = (clientX) => {
        if (!isDragging.current) return;
        const diff = clientX - startX.current;
        setRotation(Math.max(0, Math.min(180, currentRotation.current + diff * 0.5)));
      };
      const handleEnd = () => { isDragging.current = false; };

      return (
        <div className="px-6 py-10 animate-in fade-in duration-500">
          <h2 className="text-[20px] font-bold text-[#0A1931] tracking-tight mb-8 pb-4 border-b border-gray-100 reveal">도서 안내</h2>
          
          <div className="border-y border-gray-100 mb-10 bg-white reveal overflow-hidden -mx-6">
             <div 
                className="w-full py-12 bg-gradient-to-b from-[#e6f4f1] to-[#fde2e4] flex flex-col items-center justify-center cursor-grab active:cursor-grabbing rounded-t-lg"
                onMouseDown={(e) => handleStart(e.clientX)} onMouseMove={(e) => handleMove(e.clientX)} onMouseUp={handleEnd} onMouseLeave={handleEnd}
                onTouchStart={(e) => handleStart(e.touches[0].clientX)} onTouchMove={(e) => handleMove(e.touches[0].clientX)} onTouchEnd={handleEnd}
             >
                <div className="text-[11px] text-[#0A1931] font-bold mb-8 bg-white/50 px-3 py-1 rounded-full animate-pulse shadow-sm">👈 좌우로 드래그하여 책을 돌려보세요 👉</div>
                <div className="book-container">
                  <div className="book" style={{ transform: `rotateY(${rotation}deg)` }}>
                    <div className="book-face book-front"></div>
                    <div className="book-face book-back"></div>
                    <div className="book-face book-spine"></div>
                  </div>
                </div>
             </div>
             <div className="p-8 text-center mt-4">
                <h3 className="font-bold text-[17px] text-[#0A1931] mb-3 tracking-tight">천재 물리학자가 평생 숨겨 온 비밀!</h3>
                <p className="text-[14px] text-gray-600 leading-relaxed font-medium break-keep">"유카와 마나부, 너의 죄를 사하노라!"<br/><br/>갈릴레오 시리즈 최신작.<br/>더욱 깊어진 미스터리와 감동이 소용돌이치는 걸작.<br/>얽히고설킨 혈연과 인연의 비밀 속으로 초대합니다.</p>
             </div>
          </div>
          
          <div className="px-1 py-4 bg-white border-t border-gray-100 pt-8 reveal">
            <h3 className="font-bold text-[16px] text-[#0A1931] tracking-tight mb-6 text-center">도서 자세히 보기</h3>
            <div className="grid grid-cols-3 gap-3">
              <BookStoreSquare storeId="kyobo" img="ci_kyobo.png" url="https://product.kyobobook.co.kr/detail/S000220515357" name="교보문고" trackStoreClick={trackStoreClick} />
              <BookStoreSquare storeId="aladin" img="ci_aladin.png" url="https://www.aladin.co.kr/shop/wproduct.aspx?ItemId=398021172" name="알라딘" trackStoreClick={trackStoreClick} />
              <BookStoreSquare storeId="yes24" img="ci_yes24.png" url="https://www.yes24.com/product/goods/193807963" name="예스24" trackStoreClick={trackStoreClick} />
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 6. Admin View (관리자 대시보드)
    // ==========================================
    function AdminView({ entries, bannedList, isAdminAuth, setIsAdminAuth, appId, db, user }) {
      const [emailInput, setEmailInput] = useState('');
      const [passwordInput, setPasswordInput] = useState('');

      const handleLogin = async () => {
        try {
          await signInWithEmailAndPassword(auth, emailInput, passwordInput);
          setIsAdminAuth(true);
        } catch (error) { alert('관리자 계정 정보가 일치하지 않습니다.'); }
      };

      if (!isAdminAuth) {
        return (
          <div className="p-8 flex flex-col items-center justify-center min-h-[70vh] animate-in fade-in bg-gray-50">
            <Icon name="lock" size={32} className="text-[#0A1931] mb-6" />
            <h2 className="text-xl font-bold mb-8 text-[#0A1931] tracking-tight">관리자 접속</h2>
            <input type="email" value={emailInput} onChange={(e) => setEmailInput(e.target.value)} placeholder="관리자 이메일" className="w-full max-w-[240px] p-4 border-b border-gray-300 text-sm outline-none focus:border-[#0A1931] mb-2 bg-transparent" />
            <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="비밀번호 입력" className="w-full max-w-[240px] p-4 border-b border-gray-300 text-center text-sm outline-none focus:border-[#0A1931] mb-8 tracking-widest bg-transparent" onKeyDown={(e) => e.key === 'Enter' && handleLogin()} />
            <button onClick={handleLogin} className="w-full max-w-[240px] bg-[#0A1931] text-white py-4 font-bold text-sm tracking-wide">접속하기</button>
          </div>
        );
      }
      return <AdminDashboard entries={entries} bannedList={bannedList} onLogout={() => setIsAdminAuth(false)} appId={appId} db={db} user={user} />;
    }

    function AdminDashboard({ entries, bannedList, onLogout, appId, db, user }) {
      const [banInput, setBanInput] = useState('');
      const [adminSort, setAdminSort] = useState('recent'); 
      const [storeClicks, setStoreClicks] = useState({ kyobo: 0, aladin: 0, yes24: 0 });
      
      // ★ 수정: 관리자 필터 조건 (최신순, 추천순, 신고글, 블라인드글)
      const sorted = useMemo(() => {
        let arr = [...entries];
        if (adminSort === 'recent') {
          arr.sort((a,b) => b.createdAt - a.createdAt);
        } else if (adminSort === 'likes') {
          arr.sort((a,b) => b.likes - a.likes);
        } else if (adminSort === 'reports') {
          // 신고 수가 1 이상인 글만 모아보기
          arr = arr.filter(e => (e.reports || 0) > 0).sort((a,b) => (b.reports || 0) - (a.reports || 0));
        } else if (adminSort === 'blinded') {
          // 블라인드된 글만 모아보기
          arr = arr.filter(e => e.isBlinded).sort((a,b) => b.createdAt - a.createdAt);
        }
        return arr;
      }, [entries, adminSort]);

      const uniqueParticipants = useMemo(() => new Set(entries.map(e => e.email)).size, [entries]);

      useEffect(() => {
        if (!user) return;
        const metricsRef = doc(db, 'artifacts', appId, 'public', 'data', 'helix_metrics', 'store_clicks');
        const unsub = onSnapshot(metricsRef, (docSnap) => {
          if (docSnap.exists()) {
            setStoreClicks({ kyobo: docSnap.data().kyobo || 0, aladin: docSnap.data().aladin || 0, yes24: docSnap.data().yes24 || 0 });
          }
        }, (error) => console.error("Metrics fetch error:", error));
        return () => unsub();
      }, [user, appId, db]);

      const handleDelete = async (id) => { if(window.confirm("삭제하시겠습니까?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'helix_entries', id)); };
      
      const handleBanAndDel = async (entry) => {
        if(window.confirm(`삭제 및 이메일(${entry.email}) 영구 차단 진행하시겠습니까?`)) {
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'helix_banned'), { email: entry.email, bannedAt: Date.now() });
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'helix_entries', entry.id));
        }
      };
      
      const handleResetReport = async (id) => {
        if(window.confirm("신고 누적 횟수를 초기화(0회)하여 블라인드를 해제하시겠습니까?")) {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'helix_entries', id), { reports: 0 });
        }
      };

      // ★ 추가: 수동 블라인드 처리 및 해제 함수
      const toggleBlind = async (id, isCurrentlyBlinded) => {
        if(window.confirm(isCurrentlyBlinded ? "블라인드 처리를 해제하여 일반 유저들에게 다시 노출하시겠습니까?" : "이 글을 블라인드 처리하여 숨기시겠습니까?")) {
          try {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'helix_entries', id), { 
              isBlinded: !isCurrentlyBlinded 
            });
          } catch(e) { console.error("Blind toggle failed:", e); }
        }
      };

      const manualBan = async () => {
        if(!banInput.includes('@')) return alert('이메일 형식 확인');
        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'helix_banned'), { email: banInput, bannedAt: Date.now(), type: 'manual' });
        setBanInput(''); alert('차단 완료');
      };

      const handleUnban = async (banId, email) => {
        if(window.confirm(`[${email}] 계정의 차단을 해제하시겠습니까?`)) {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'helix_banned', banId));
          alert("차단이 해제되었습니다.");
        }
      };

      const exportCSV = () => {
        const headers = ['순위', '닉네임', '이메일', '공감수', '신고누적수', '블라인드여부', '카피내용', '작성일시'];
        const rows = sorted.map((e, idx) => [idx + 1, e.nickname, e.email, e.likes || 0, e.reports || 0, e.isBlinded ? 'O' : 'X', `"${e.content.replace(/"/g, '""')}"`, new Date(e.createdAt).toLocaleString()]);
        const csvContent = '\uFEFF' + [headers, ...rows].map(e => e.join(",")).join("\n"); 
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
        link.setAttribute("download", `이벤트데이터_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      return (
        <div className="bg-gray-50 min-h-screen px-4 py-8 animate-in fade-in">
          <div className="flex justify-between items-end mb-8 pb-4 border-b border-gray-200">
            <h2 className="text-[20px] font-bold text-[#0A1931]">관리자 패널</h2>
            <button onClick={onLogout} className="text-[12px] font-bold text-gray-500">로그아웃</button>
          </div>
          
          <div className="grid grid-cols-3 gap-3 mb-4">
            <div className="bg-white p-4 flex flex-col items-center justify-center border border-gray-200">
              <span className="text-[11px] text-gray-500 font-bold mb-1">총 응모 건수</span>
              <span className="text-xl font-bold text-[#0A1931]">{entries.length}</span>
            </div>
            <div className="bg-white p-4 flex flex-col items-center justify-center border border-gray-200">
              <span className="text-[11px] text-blue-600 font-bold mb-1">순수 참여자 수</span>
              <span className="text-xl font-bold text-blue-600">{uniqueParticipants}</span>
            </div>
            <div className="bg-white p-4 flex flex-col items-center justify-center border border-gray-200">
              <span className="text-[11px] text-red-500 font-bold mb-1">총 공감 수</span>
              <span className="text-xl font-bold text-red-500">{entries.reduce((sum, e) => sum + (e.likes||0), 0)}</span>
            </div>
          </div>

          <div className="bg-white p-5 border border-gray-200 mb-8">
            <h3 className="font-bold text-[13px] text-[#0A1931] mb-4 flex items-center gap-1.5"><Icon name="mousePointer" size={14}/> 서점별 도서 상세 보기 클릭 현황</h3>
            <div className="grid grid-cols-3 gap-3 text-center divide-x divide-gray-100">
              <div>
                <div className="text-[11px] font-bold text-gray-500 mb-1">교보문고</div>
                <div className="text-lg font-bold text-gray-800">{storeClicks.kyobo}회</div>
              </div>
              <div>
                <div className="text-[11px] font-bold text-gray-500 mb-1">알라딘</div>
                <div className="text-lg font-bold text-gray-800">{storeClicks.aladin}회</div>
              </div>
              <div>
                <div className="text-[11px] font-bold text-gray-500 mb-1">예스24</div>
                <div className="text-lg font-bold text-gray-800">{storeClicks.yes24}회</div>
              </div>
            </div>
          </div>

          <button onClick={exportCSV} className="w-full flex items-center justify-center gap-2 bg-[#0A1931] text-white py-4 font-bold text-[14px] mb-8">
            <Icon name="download" size={16} /> 전체 참여 데이터 엑셀 다운로드
          </button>

          <div className="bg-white p-6 border border-gray-200 mb-8">
            <h3 className="font-bold text-[13px] text-[#0A1931] mb-4">수동 이메일 차단 및 해제</h3>
            <div className="flex gap-2 mb-4">
              <input type="email" value={banInput} onChange={e => setBanInput(e.target.value)} placeholder="차단할 이메일 입력" className="flex-1 border-b border-gray-300 py-2 text-[14px] outline-none focus:border-[#0A1931] bg-transparent" />
              <button onClick={manualBan} className="bg-red-500 text-white px-4 font-bold text-[13px]">차단</button>
            </div>
            
            {bannedList.length > 0 && (
              <div className="mt-4 pt-4 border-t border-gray-100">
                <h4 className="text-[11px] font-bold text-gray-500 mb-3">차단된 이메일 목록 ({bannedList.length}건)</h4>
                <div className="max-h-40 overflow-y-auto flex flex-col gap-2">
                  {bannedList.map(b => (
                    <div key={b.id} className="flex justify-between items-center bg-gray-50 px-3 py-2 border border-gray-100">
                      <span className="text-[12px] text-gray-800">{b.email}</span>
                      <button onClick={() => handleUnban(b.id, b.email)} className="text-[11px] font-bold text-blue-500 hover:text-blue-700">차단 해제</button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          <div className="space-y-4">
            <div className="flex flex-col gap-3 mb-4">
               <h3 className="font-bold text-[14px] text-[#0A1931]">실시간 데이터 목록</h3>
               {/* ★ 수정: 정렬 탭 UI 개선 및 신고글, 블라인드글 추가 */}
               <div className="flex gap-1.5 flex-wrap">
                 <button onClick={() => setAdminSort('recent')} className={`text-[11px] font-bold px-2.5 py-1.5 border rounded ${adminSort==='recent' ? 'bg-[#0A1931] text-white' : 'bg-white text-gray-600 border-gray-200'}`}>최신순</button>
                 <button onClick={() => setAdminSort('likes')} className={`text-[11px] font-bold px-2.5 py-1.5 border rounded ${adminSort==='likes' ? 'bg-[#0A1931] text-white' : 'bg-white text-gray-600 border-gray-200'}`}>추천순</button>
                 <button onClick={() => setAdminSort('reports')} className={`text-[11px] font-bold px-2.5 py-1.5 border rounded ${adminSort==='reports' ? 'bg-red-500 text-white border-red-500' : 'bg-white text-red-500 border-red-200'}`}>🚨 신고글</button>
                 <button onClick={() => setAdminSort('blinded')} className={`text-[11px] font-bold px-2.5 py-1.5 border rounded ${adminSort==='blinded' ? 'bg-gray-800 text-white border-gray-800' : 'bg-white text-gray-600 border-gray-200'}`}>🙈 블라인드글</button>
               </div>
            </div>

            {sorted.map((entry, idx) => (
              <div key={entry.id} className={`bg-white p-5 border ${entry.isBlinded ? 'border-gray-800 shadow-sm bg-gray-50' : entry.reports >= 10 ? 'border-red-400 shadow-[0_0_15px_rgba(239,68,68,0.15)]' : 'border-gray-200'}`}>
                <div className="flex justify-between items-start mb-3">
                  <div>
                    <span className="text-[11px] font-bold text-[#0A1931] mr-2">{idx+1}위</span>
                    <span className="font-bold text-[14px] text-gray-900">{entry.nickname}</span>
                    {entry.reports > 0 && <span className={`text-[10px] font-bold ml-2 px-1.5 py-0.5 rounded ${entry.reports >= 10 ? 'bg-red-600 text-white' : 'bg-red-50 text-red-500'}`}>🚨 신고 {entry.reports}회</span>}
                    {/* ★ 추가: 블라인드된 글 뱃지 표시 */}
                    {entry.isBlinded && <span className="text-[10px] font-bold ml-2 px-1.5 py-0.5 rounded bg-gray-800 text-white">🙈 블라인드 처리됨</span>}
                    <div className="text-[11px] text-gray-500 mt-1">{entry.email} (PW:{entry.password})</div>
                  </div>
                  <span className="text-[12px] font-bold text-[#0A1931] flex items-center gap-1"><Icon name="heart" size={12} fill="currentColor"/> {entry.likes}</span>
                </div>
                {/* ★ 추가: 블라인드된 글이면 배경색과 텍스트 색상을 어둡게 처리 */}
                <p className={`text-[14px] font-medium break-keep leading-relaxed p-4 mb-4 whitespace-pre-wrap break-all ${entry.isBlinded ? 'bg-gray-200 text-gray-500' : 'bg-gray-50 text-gray-800'}`}>{entry.content}</p>
                <div className="flex gap-3 flex-wrap">
                  {/* ★ 추가: 블라인드 토글 버튼 */}
                  <button onClick={() => toggleBlind(entry.id, entry.isBlinded)} className={`text-[12px] font-bold flex items-center gap-1.5 px-2 py-1 -ml-2 rounded smooth-transition ${entry.isBlinded ? 'text-gray-800 hover:bg-gray-200' : 'text-gray-500 hover:bg-gray-100 hover:text-gray-800'}`}>
                    <Icon name={entry.isBlinded ? "eye" : "eyeOff"} size={14}/> {entry.isBlinded ? '블라인드 해제' : '블라인드 처리'}
                  </button>
                  <button onClick={() => handleDelete(entry.id)} className="text-[12px] font-bold text-gray-500 flex items-center gap-1 hover:text-gray-900"><Icon name="trash2" size={14}/> 삭제</button>
                  <button onClick={() => handleBanAndDel(entry)} className="text-[12px] font-bold text-red-400 flex items-center gap-1 hover:text-red-600"><Icon name="ban" size={14}/> 차단+삭제</button>
                  {entry.reports >= 10 && (
                    <button onClick={() => handleResetReport(entry.id)} className="text-[12px] font-bold text-blue-500 flex items-center gap-1 hover:text-blue-700 ml-auto">🚨 신고 횟수 초기화</button>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
